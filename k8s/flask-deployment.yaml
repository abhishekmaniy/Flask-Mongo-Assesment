apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
        - name: flask-app

          image: abhishekmaniyar3811/flask-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          env:
            - name: MONGO_HOST
              value: mongodb-service

            - name: MONGO_PORT
              value: "27017"

            - name: MONGO_AUTH_SOURCE
              value: "admin"

            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_INITDB_ROOT_USERNAME

            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_INITDB_ROOT_PASSWORD

            - name: MONGODB_URI
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb-service:27017/admin?authSource=admin"

          resources:
            requests:
              cpu: "200m"
              memory: "250Mi"

            limits:
              cpu: "500m"
              memory: "500Mi"

          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20